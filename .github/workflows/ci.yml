# CI do lex — o compilador é escrito EM LEX.
#
# O bootstrap parte da SEMENTE (`src/lex-seed.ll.gz`, o LLVM IR do próprio
# compilador no ponto-fixo): clang a transforma em `bin/lex`, e a partir daí o lex
# recompila a si mesmo a partir do fonte. A única dependência é o clang/LLVM.
name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: instala o LLVM 18 (clang, wasm-ld, llvm-lib)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y clang-18 lld-18
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/wasm-ld-18 /usr/local/bin/wasm-ld

      # Constrói o lex a partir da semente E valida o ponto-fixo (o compilador
      # reproduz a si mesmo byte a byte). Se a semente estiver dessincronizada do
      # fonte, isto falha — rode ./src/scripts/regen-seed.sh e commite.
      - name: bootstrap a partir da semente
        run: ./src/scripts/build-seed.sh

      # a suíte por módulo (o portão de paridade roda no passo seguinte)
      - name: suíte de testes
        run: |
          for f in src/tests/*.test.lex; do
            [ "$f" = "src/tests/parity.test.lex" ] && continue
            ./bin/lex test "$f" || exit 1
          done

      - name: portão de paridade (linguagem completa, e2e)
        run: ./bin/lex test src/tests/parity.test.lex

      - name: check (tipos/sintaxe) sem falso-positivo no próprio repo
        run: |
          # src/std/agent, src/std/ai e src/std/mcp ficam DE FORA: hoje eles
          # nao passam no check (centenas de erros de sintaxe, desde que
          # entraram). Incluir e vermelho permanente; quando forem consertados,
          # acrescente src/std/*/*.lex aqui.
          for f in src/*.lex src/compiler/*.lex src/tools/*.lex src/std/*.lex \
                   src/tests/fixtures/*.lsx site/pages/*.lsx; do
            out=$(./bin/lex check "$f")
            [ "$out" = "[]" ] || { echo "diagnóstico inesperado em $f: $out"; exit 1; }
          done

      # NÃO bloqueia: hoje o formatador quer expandir todo helper de uma linha
      # (`fn tk(...): Token { return ... }`) em três, o que briga com o estilo
      # de TODO o repo — inclusive de arquivos que ninguém tocou. Enquanto o
      # fmt não preservar o corpo de uma linha, isto é um aviso, não um portão.
      - name: fmt --check (informativo)
        continue-on-error: true
        run: |
          ./bin/lex fmt --check src/*.lex src/compiler/*.lex src/tools/*.lex src/std/*.lex
          # .lsx: só o frontmatter é formatado (no corpo o espaço é conteúdo)
          ./bin/lex fmt --check src/tests/fixtures/*.lsx site/pages/*.lsx

      # `lex server --build` compila as paginas .lsx num binario nativo. Subir
      # o binario e bater numa rota prova o pipeline inteiro: .lsx -> componente
      # -> envelope do documento -> HTTP.
      - name: site (.lsx) — compila, sobe e responde
        run: |
          ./bin/lex server site/ --build /tmp/lex-site
          (cd site && /tmp/lex-site --port 8099 &)
          for i in $(seq 1 20); do
            curl -fsS "http://localhost:8099/ola?nome=ci" >/tmp/out.html && break
            sleep 0.5
          done
          grep -q '<h1[^>]*>Ola, ci!</h1>' /tmp/out.html
          grep -q '<!DOCTYPE html>' /tmp/out.html      # o envelope vem do runtime
          curl -fsS -o /dev/null http://localhost:8099/install.sh   # estatico de public/
          pkill -f lex-site
